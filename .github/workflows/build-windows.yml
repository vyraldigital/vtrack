name: Build Windows App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# Required to create releases and upload assets
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Stamp a unique semver on every build so electron-updater can detect
      # newer versions. Format: 1.0.<run_number> (e.g. 1.0.5, 1.0.6, …)
      - name: Set build version
        run: npm version 1.0.${{ github.run_number }} --no-git-tag-version --allow-same-version

      - name: Build and Package (Windows)
        run: npm run build && npm run package -- --win --x64 --publish never

      # Publish a GitHub Release with:
      #   • the NSIS installer (.exe) — editors click to install/update
      #   • latest.yml — electron-updater reads this to detect new versions
      #     and verify the SHA512 hash of the download before applying it
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "vTrack v1.0.${{ github.run_number }}"
          body: |
            Automated Windows build from commit ${{ github.sha }}

            **Fresh install:** Download the `.exe` below → run it → click "More info → Run anyway" if Windows SmartScreen appears.
            **Existing installs:** vTrack will prompt you to restart and apply this update automatically.
          files: |
            dist-packaged/*.exe
            dist-packaged/latest.yml
          make_latest: true
