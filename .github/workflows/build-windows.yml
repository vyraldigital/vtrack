name: Build Windows App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# Required to create releases and upload assets
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Stamp a unique semver on every build so electron-updater can detect
      # newer versions. Format: 1.0.<run_number> (e.g. 1.0.5, 1.0.6, …)
      - name: Set build version
        run: npm version 1.0.${{ github.run_number }} --no-git-tag-version --allow-same-version

      - name: Build and Package (Windows)
        env:
          VITE_SUPABASE_URL: "https://aclftdltfpfsehdkxcwo.supabase.co"
          VITE_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFjbGZ0ZGx0ZnBmc2VoZGt4Y3dvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NTE3NDMsImV4cCI6MjA5NDMyNzc0M30.o607u9kjIsKmArhcGq7t_PTlPdxAIDUIJ-BAcONhHFc"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build && npm run package -- --win --x64 --publish always
